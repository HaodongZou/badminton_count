services:
  badminton:
    image: badminton-count:latest
    ports:
      - "48020:18080"
    environment:
      - DATABASE_PATH=/data/badminton.db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY required}
      - LLM_BASE_URL=https://api.minimax.com/anthropic
      - LLM_MODEL=MiniMax-M2.7
      # - LLM_API_KEY=   # 设置在 .env 或部署时注入
    volumes:
      - /tmp/zfsv3/nvme12/13263199088/data/Docker/badminton/data:/data
    restart: unless-stopped
